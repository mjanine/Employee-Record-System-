<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Head Profile | Management System</title>
    <link rel="shortcut icon" type="image/png" href="../../static/img/general/uph.png">
    <link rel="stylesheet" href="../../static/css/accounts/head_profile_edit.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="background"></div>

    <div class="dashboard-viewport">
        <div class="sidebar" id="sidebar">
            <div class="top-section">
                <div class="logo-wrapper" id="logoToggle">
                    <img src="../../static/img/general/uph.png" class="logo">
                    <div class="open-icon"><i class="fas fa-chevron-right"></i></div>
                </div>
                <button class="close-btn" id="closeBtn"><i class="fas fa-chevron-left"></i></button>
            </div>

            <ul class="menu">
                <li><a href="../dashboards/head_dash.html" class="menu-item"><i class="fas fa-border-all"></i> <span>Dashboard</span></a></li>
                <li><a href="head_profile_view.html" class="menu-item active"><i class="fas fa-user"></i> <span>Profile</span></a></li>
                <hr>
                <li><a href="#" class="menu-item"><i class="fas fa-star"></i> <span>Performance Evaluation</span></a></li>
                <li><a href="#" class="menu-item"><i class="fas fa-calendar-check"></i> <span>Attendance</span></a></li>
                <li><a href="../leave/head_leaveselect.html" class="menu-item"><i class="fas fa-plane-departure"></i> <span>Leave Request</span></a></li>
            </ul>

            <div class="bottom-section">
                <a href="../login/login.html" class="menu-item logout"><i class="fas fa-sign-out-alt"></i> <span>Log Out</span></a>
            </div>
        </div>

        <main class="main-content">
            <div class="content-card">
                <h1>Edit Head Profile</h1>
                
                <div class="form-body">
                    <form class="form-grid" id="editHeadForm">
                        <section class="form-section-box">
                            <div class="section-header">Basic Information</div>
                            <div class="section-body">
                                <div class="photo-container">
                                    <div class="photo-circle" onclick="document.getElementById('photoInput').click()" style="cursor: pointer;">
                                        <img id="displayPhoto" src="../../static/img/sample-profile-pic.jfif">
                                        <input type="file" id="photoInput" style="display: none;" accept="image/*" onchange="previewImage(this)">
                                    </div>
                                    <span class="photo-label">Click photo to update picture</span>
                                </div>

                                <div class="inputs-row">
                                    <div class="input-item"><label>First Name</label><input type="text" id="firstName" readonly></div>
                                    <div class="input-item"><label>Last Name</label><input type="text" id="lastName" readonly></div>
                                    <div class="input-item"><label>Employment I.D</label><input type="text" id="empID" readonly></div>
                                    <div class="input-item"><label>Employment Status</label><input type="text" id="empStatus" readonly></div>
                                    <div class="input-item"><label>Employment Type</label><input type="text" id="empType" readonly></div>
                                    <div class="input-item"><label>Department / Office</label><input type="text" id="dept" readonly></div>
                                    <div class="input-item"><label>Position/Rank</label><input type="text" id="pos" readonly></div>
                                    <div class="input-item"><label>Date Hired</label><input type="text" id="dateHired" readonly></div>
                                </div>
                            </div>
                        </section>

                        <section class="form-section-box">
                            <div class="section-header">Personal Information</div>
                            <div class="section-body">
                                <div class="full-width-item"><label>Email Address</label><input type="email" id="email"></div>
                                <div class="full-width-item"><label>Contact Number</label><input type="text" id="contact"></div>
                                <div class="full-width-item"><label>Address</label><input type="text" id="address"></div>
                                
                                <h4 class="sub-header">Emergency Contact</h4>
                                <div class="inputs-row">
                                    <div class="input-item"><label>Contact Name</label><input type="text" id="emergencyName"></div>
                                    <div class="input-item"><label>Contact Number</label><input type="text" id="emergencyPhone"></div>
                                </div>
                            </div>
                        </section>
                    </form>
                </div>

                <div class="form-footer">
                    <button type="button" class="btn btn-cancel" onclick="window.location.href='head_profile_view.html'">Cancel</button>
                    <button type="button" class="btn btn-save" onclick="updateHeadRecord()">Update Record</button>
                </div>
            </div>
        </main>
    </div>

    <script src="../../static/js/accounts/head_profile_edit.js"></script>
</body>
</html>
