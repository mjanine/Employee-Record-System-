<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit My Profile | School Director</title>
    <link rel="shortcut icon" type="image/png" href="../../static/img/general/uph.png">
    <link rel="stylesheet" href="../../static/css/accounts/sd_profile_edit.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="background"></div>

    <div class="dashboard-viewport">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="top-section">
                <div class="logo-wrapper" id="logoToggle">
                    <img src="../../static/img/general/uph.png" class="logo">
                    <div class="open-icon"><i class="fas fa-chevron-right"></i></div>
                </div>
                <button class="close-btn" id="closeBtn"><i class="fas fa-chevron-left"></i></button>
            </div>

            <ul class="menu">
                <li><a href="../dashboards/sd_dash.html" class="menu-item"><i class="fas fa-border-all"></i> <span>Dashboard</span></a></li>
                <li><a href="../accounts/sd_profile_view.html" class="menu-item active"><i class="fas fa-user"></i> <span>Profile</span></a></li>
                <hr>
                <li><a href="ENTER" class="menu-item"><i class="fas fa-star"></i> <span>Performance Evaluation</span></a></li>
                <li><a href="ENTER" class="menu-item"><i class="fas fa-calendar-check"></i> <span>Attendance</span></a></li>
                <li><a href="../leave/sd_leaveselect.html" class="menu-item"><i class="fas fa-plane-departure"></i> <span>Leave Request</span></a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-card">
                <h1>Edit My Profile</h1>

                <div class="form-body">
                    <form class="form-grid" id="editSDForm">
                        <section class="form-section-box">
                            <div class="section-header">Basic Information</div>
                            <div class="section-body">
                                <div class="photo-container">
                                    <div class="photo-circle">
                                        <img id="displayPhoto" src="../../static/img/sample-profile-pic.jfif">
                                    </div>
                                    <span class="photo-label">Contact IT to update photo</span>
                                </div>
                                <div class="inputs-row">
                                    <div class="input-item"><label>First Name</label><input type="text" id="firstName" readonly></div>
                                    <div class="input-item"><label>Last Name</label><input type="text" id="lastName" readonly></div>
                                    <div class="input-item"><label>Employment I.D</label><input type="text" id="sdID" readonly></div>
                                    <div class="input-item"><label>Employment Status</label><input type="text" id="sdStatus" readonly></div>
                                    <div class="input-item"><label>Employment Type</label><input type="text" id="sdType" readonly></div>
                                    <div class="input-item"><label>Department / Office</label><input type="text" id="dept" readonly></div>
                                    <div class="input-item"><label>Position/Rank</label><input type="text" id="pos" readonly></div>
                                    <div class="input-item"><label>Date Hired</label><input type="text" id="dateHired" readonly></div>
                                </div>
                            </div>
                        </section>

                        <section class="form-section-box">
                            <div class="section-header">Personal Information</div>
                            <div class="section-body">
                                <div class="full-width-item"><label>Email Address</label><input type="email" id="email"></div>
                                <div class="full-width-item"><label>Contact Number</label><input type="text" id="contact"></div>
                                <div class="full-width-item"><label>Address</label><input type="text" id="address"></div>

                                <h4 class="sub-header">Emergency Contact</h4>
                                <div class="inputs-row">
                                    <div class="input-item"><label>Contact Name</label><input type="text" id="emergencyName"></div>
                                    <div class="input-item"><label>Contact Number</label><input type="text" id="emergencyPhone"></div>
                                </div>
                            </div>
                        </section>
                    </form>
                </div>

                <div class="form-footer">
                    <button type="button" class="btn btn-cancel" onclick="window.location.href='sd_profile_view.html'">Cancel</button>
                    <button type="button" class="btn btn-save" onclick="updateSD()">Update Changes</button>
                </div>
            </div>
        </main>
    </div>

    <script src="../../static/js/accounts/sd_profile_edit.js"></script>
</body>
</html>
