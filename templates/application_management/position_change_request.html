<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Change Request | HR System</title>
    <link rel="shortcut icon" type="image/png" href="../../static/img/general/uph.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/application_management/position_change_request.css">
</head>
<body>

<div id="toast-container"></div>

<!-- ================= PAGE WRAPPER ================= -->
<div class="page-wrapper">
    
    <!-- TOP LOGO SECTION -->
    <div class="top-header">
        <img src="../../static/img/general/uph.png" alt="UPHSD Logo" class="top-logo">
    </div>

    <!-- MAIN FORM AREA -->
    <div class="form-container">
        
        <!-- TITLE -->
        <h1 class="form-title">Log New Position Change Request</h1>

        <!-- FORM CONTENT - TWO COLUMNS -->
        <div class="form-content">
            
            <!-- LEFT COLUMN: EMPLOYEE INFORMATION -->
            <div class="form-column">
                <h2 class="column-title">Employee Information</h2>
                
                <div class="form-group">
                    <label for="empName">Employee Name</label>
                    <input type="text" id="empName" placeholder="e.g. Dela Cruz, Juan">
                </div>

                <div class="form-group">
                    <label for="empId">Employee ID</label>
                    <input type="text" id="empId" disabled placeholder="Auto-filled">
                </div>

                <div class="form-group">
                    <label for="currentPos">Current Position</label>
                    <input type="text" id="currentPos" disabled placeholder="Auto-filled">
                </div>
            </div>

            <!-- RIGHT COLUMN: POSITION CHANGE DETAILS -->
            <div class="form-column">
                <h2 class="column-title">Position Change Details</h2>
                
                <div class="form-group">
                    <label for="currentDept">Department</label>
                    <input type="text" id="currentDept" disabled placeholder="Auto-filled">
                </div>

                <div class="form-group">
                    <label for="requestedPos">Requested Position</label>
                    <select id="requestedPos">
                        <option disabled selected value="">Select position...</option>
                        <option>Dean</option>
                        <option>Department Head</option>
                        <option>Senior Instructor</option>
                        <option>Instructor</option>
                        <option>Professor</option>
                        <option>Assistant Professor</option>
                        <option>Registrar</option>
                        <option>Clinical Instructor</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="effectiveDate">Effective Date</label>
                    <input type="date" id="effectiveDate">
                </div>
            </div>

        </div>

        <!-- REASON SECTION -->
        <div class="reason-section">
            <h2 class="section-title">Additional Information</h2>
            <label for="reason">Reason for Position Change</label>
            <textarea id="reason" rows="5" placeholder="Please provide a detailed reason for the position change..."></textarea>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="form-actions">
            <button class="btn-cancel" id="cancelBtn">CANCEL</button>
            <button class="btn-submit" id="submitBtn">SAVE</button>
        </div>

    </div>
</div>

<script src="../../static/js/application_management/position_change_request.js"></script>

</body>
</html>
