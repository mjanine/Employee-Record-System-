{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leave Management | Employee System</title>
    <link rel="shortcut icon" type="image/png" href="{% static 'img/general/uph.png' %}">
    <link rel="stylesheet" href="{% static 'css/employee/emp_leaveselect.css' %}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="background"></div>

    <div class="dashboard-viewport">
        <div class="sidebar" id="sidebar">
            <div class="top-section">
                <div class="logo-wrapper" id="logoToggle">
                    <img src="{% static 'img/general/uph.png' %}" class="logo">
                    <div class="open-icon">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
                <button class="close-btn" id="closeBtn">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>

            <ul class="menu">
                <li><a href="{% url 'employee_dashboard' %}" class="menu-item"><i class="fas fa-border-all"></i> <span>Dashboard</span></a></li>
                <li><a href="{% url 'employee_profile' %}" class="menu-item"><i class="fas fa-user"></i> <span>Profile</span></a></li>
                <hr>
                <li><a href="{% url 'create_position_change' %}" class="menu-item"><i class="fas fa-user-edit"></i><span>Position Change Request</span></a></li>
                <li><a href="{% url 'attendance:employee_attendance_records' %}" class="menu-item"><i class="fas fa-calendar-check"></i><span>Attendance</span></a></li>
                <li><a href="{% url 'leaves:leave_select' %}" class="menu-item active"><i class="fas fa-plane-departure"></i><span>Leave Request</span></a></li>
                <li><a href="javascript:void(0);" class="menu-item" onclick="alert('This module is currently under development.'); return false;" aria-disabled="true"><i class="fas fa-star"></i><span>Performance Evaluation</span></a></li>
                <li><a href="{% url 'trainings:employee_trainings' %}" class="menu-item"><i class="fas fa-chalkboard-teacher"></i><span>Trainings</span></a></li>
            </ul>

            <div class="bottom-section">
                <a href="{% url 'logout' %}" class="menu-item logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Log Out</span>
                </a>
            </div>
        </div>

        <main class="main-content">
            <div class="selection-modal">
                <h2>Leave Management</h2>
                <p>Please select an option to proceed</p>
                
                <div class="modal-options">
                    <a href="{% url 'leaves:apply_leave' %}" class="opt-card">
                        <i class="fas fa-file-signature"></i>
                        <span>Apply for Leave</span>
                    </a>
                    
                    <a href="{% url 'leaves:leave_history' %}" class="opt-card">
                        <i class="fas fa-history"></i>
                        <span>Leave Requests / History</span>
                    </a>
                </div>
            </div>
        </main>
    </div>

    <script src="{% static 'js/employee/emp_leaveselect.js' %}"></script>
</body>
</html>
