<html lang="en">
<head>

</head>
<body>

    <div class="background"></div>

    <div class="sidebar" id="sidebar">

        <!-- TOP -->

            <div class="logo-wrapper" id="logoToggle">
                <img src="../../static/img/general/uph.png" class="logo">

                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>

            <button class="close-btn" id="closeBtn">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>

        <!-- MENU -->
        <ul class="menu">

            <li>
                <a href="emp_dash.html" class="menu-item active">
                    <i class="fas fa-border-all"></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <li>
                <a href="ENTER" class="menu-item">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </li>

            <hr>

            <li>
                <a href="ENTER" class="menu-item">
                    <i class="fas fa-user-edit"></i>
                    <span>Position Change Request</span>
                </a>
            </li>

            <li>
                <a href="ENTER" class="menu-item">
                    <i class="fas fa-calendar-check"></i>
                    <span>Attendance</span>
                </a>
            </li>

            <li>
                <a href="ENTER" class="menu-item">
                    <i class="fas fa-plane-departure"></i>
                    <span>Leave Request</span>
                </a>
            </li>

            <li>
                <a href="ENTER" class="menu-item">

            </li>

            </li>

            <li>
                <a href="ENTER" class="menu-item">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <span>Trainings</span>

        </ul>

        <!-- LOGOUT -->
        <div class="bottom-section">
            <a href="../login/login.html" class="menu-item logout">
                <i class="fas fa-sign-out-alt"></i>
                <span>Log Out</span>
            </a>
        </div>

    </div>

    </div>

       <main class="main-content">
    <div class="form-wrapper">
        <form id="employeeForm">
            <section class="form-card">
                <div class="card-header">Applicant Information</div>
                <div class="card-body">
                    <div class="grid-2-col">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" placeholder="Enter first name" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" placeholder="Enter last name" required>
                        </div>
                    </div>

                    <div class="grid-2-col">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="Enter a valid email address" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" placeholder="Enter phone number">
                        </div>
                    </div>

                    <div class="grid-2-col">
                        <div class="form-group">
                            <label for="dept">Department Applying To</label>
                            <select id="dept" required>
                                <option value="" disabled selected>Select department...</option>
                                <option value="HR">Human Resources</option>
                                <option value="IT">Information Technology</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="position">Position Applying For</label>
                            <select id="position" required>
                                <option value="" disabled selected>Select position...</option>
                                <option value="Manager">Manager</option>
                                <option value="Staff">Staff</option>
                            </select>
                        </div>
                    </div>

                    <div class="cv-section">
                        <label>Tell us about yourself</label>
                        <div class="upload-container">
                            <button type="button" class="btn-upload" id="uploadBtn">Upload CV</button>
                            <span id="fileNameDisplay">File_Name.pdf</span>
                            <input type="file" id="cvInput" hidden>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-cancel" id="btnCancel">Cancel</button>
                        <button type="submit" class="btn btn-save">Save</button>
                    </div>
                </div>
            </section>
        </form>
    </div>
</main>
    </div>

    <script src="../js/application_info.js"></script>
</body>
</html>
