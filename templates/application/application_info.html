<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form - New Employee</title>
    <link rel="shortcut icon" type="image/png" href="../../static/img/general/uph.png">
    <link rel="stylesheet" href="../../static/css/application/application_info.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="background"></div>

    <main class="main-content">
        <div class="form-card">
            <div class="form-header">
                <i class="fa-solid fa-user-pen" style="margin-right: 10px; color: #000000;"></i>
                Applicant Information
            </div>
            <form id="applicantForm" class="form-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" placeholder="Enter first name" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" placeholder="Enter last name" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="Enter a valid email address" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" placeholder="Enter phone number">
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Department Applying To</label>
                    <select required>
                        <option value="" disabled selected>Select department...</option>
                        <option>Human Resources</option>
                        <option>Information Technology</option>
                        <option>Marketing</option>
                        <option>Finance</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>Position Applying For</label>
                    <select required>
                        <option value="" disabled selected>Select position...</option>
                        <option>Manager</option>
                        <option>Staff</option>
                        <option>Intern</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>Tell us about yourself (CV)</label>
                    <div class="upload-container">
                        <label for="cv-upload" class="upload-btn">
                            <i class="fa-solid fa-cloud-arrow-up"></i> Upload CV
                        </label>
                        <input type="file" id="cv-upload" accept=".pdf" hidden>
                        <span id="file-name">No file chosen (PDF only)</span>
                    </div>
                </div>

                <div class="form-footer">
                    <button type="button" class="btn-cancel">Cancel</button>
                    <button type="submit" class="btn-save">Save</button>
                </div>
            </form>
        </div>
    </main>

    <script src="../../static/js/application employee/application_info.js"></script>
</body>
</html>
