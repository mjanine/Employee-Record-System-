<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System - Add Employee</title>
    <link rel="stylesheet" href="application_info.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-top"></div>
        </aside>

        <main class="main-content">
            <div class="form-wrapper">
                <form id="employeeForm">
                    <section class="form-card">
                        <div class="card-header">Applicant Information</div>
                        
                        <div class="card-body">
                            <div class="grid-2-col">
                                <div class="form-group">
                                    <label for="firstName">First Name</label>
                                    <input type="text" id="firstName" placeholder="Enter first name" required>
                                </div>
                                <div class="form-group">
                                    <label for="lastName">Last Name</label>
                                    <input type="text" id="lastName" placeholder="Enter last name" required>
                                </div>
                            </div>

                            <div class="grid-2-col">
                                <div class="form-group">
                                    <label for="email">Email</label>
                                    <input type="email" id="email" placeholder="Enter a valid email address" required>
                                </div>
                                <div class="form-group">
                                    <label for="phone">Phone Number</label>
                                    <input type="tel" id="phone" placeholder="Enter phone number">
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="dept">Department Applying To</label>
                                <select id="dept" required>
                                    <option value="" disabled selected>Select department...</option>
                                    <option value="HR">Human Resources</option>
                                    <option value="IT">Information Technology</option>
                                    <option value="Marketing">Marketing</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="pos">Position Applying For</label>
                                <select id="pos" required>
                                    <option value="" disabled selected>Select position...</option>
                                    <option value="Manager">Manager</option>
                                    <option value="Developer">Developer</option>
                                    <option value="Designer">Designer</option>
                                </select>
                            </div>

                            <div class="cv-section">
                                <label>Tell us about yourself</label>
                                <div class="upload-container">
                                    <button type="button" class="btn-upload" id="uploadBtn">Upload CV</button>
                                    <span id="fileNameDisplay">File_Name.pdf</span>
                                    <input type="file" id="cvInput" hidden>
                                </div>
                            </div>

                            <div class="form-actions">
                                <button type="button" class="btn btn-cancel" id="btnCancel">Cancel</button>
                                <button type="submit" class="btn btn-save">Save</button>
                            </div>
                        </div>
                    </section>
                </form>
            </div>
        </main>
    </div>

    <script src="application_info.js"></script>
</body>
</html>
