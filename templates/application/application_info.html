<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form - New Employee</title>
    <!-- Favicon and External Resources -->
    <link rel="shortcut icon" type="image/png" href="../../static/img/general/uph.png">
    <link rel="stylesheet" href="../../static/css/application/application_info.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <!-- Main Wrapper -->
    <main class="main-content full-view">
        <div class="form-card transparent-layout">
            
            <!-- Header: Logo is absolute-left, Title is centered -->
            <div class="form-header centered-header">
                <img src="../../static/img/general/uph.png" alt="Logo" class="header-logo">
                <span class="header-title">Applicant Information</span>
            </div>
            
            <form id="applicantForm" class="form-body">
                <div class="split-container">
                    
                    <!-- Left Panel: Personal Information -->
                    <div class="panel left-panel">
                        <h3 class="section-title">Personal Information</h3>
                        
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" placeholder="First Name" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" placeholder="Last Name" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" placeholder="Email Address" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="text" placeholder="Phone Number">
                        </div>
                    </div>

                    <!-- Right Panel: Application Details -->
                    <div class="panel right-panel">
                        <h3 class="section-title">Application Details</h3>

                        <div class="form-group">
                            <label>Department Applying To</label>
                            <select required>
                                <option value="" disabled selected>Select department...</option>
                                <option>Human Resources</option>
                                <option>Information Technology</option>
                                <option>Marketing</option>
                                <option>Finance</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Position Applying For</label>
                            <select required>
                                <option value="" disabled selected>Select position...</option>
                                <option>Manager</option>
                                <option>Staff</option>
                                <option>Intern</option>
                            </select>
                        </div>

                        <div class="form-group drop-zone-group">
                            <label>Tell us about yourself (CV)</label>
                            <div class="drop-zone" id="drop-zone">
                                <input type="file" id="cv-upload" accept=".pdf,.jpg,.png" hidden>
                                <div class="drop-zone-content">
                                    <i class="fa-solid fa-cloud-arrow-up"></i>
                                    <p class="drop-zone-text">Drag and Drop or Browse Files</p>
                                    <p class="drop-zone-subtext">Pdf, Jpg, PNG - Max 10mb</p>
                                    <span id="file-name" class="drop-zone-filename">No file chosen</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sticky Footer -->
                <div class="form-footer aligned-right">
                    <button type="button" id="cancelBtn" class="btn-cancel">CANCEL</button>
                    <button type="submit" class="btn-save">SUBMIT</button>
                </div>
            </form>
        </div>
    </main>

    <!-- Success Modal -->
    <div id="successModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="success-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h2>Application Sent</h2>
            <p>Success! Your application information has been submitted.</p>
            <button id="modalOkBtn" class="btn-ok">OK</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../static/js/application employee/application_info.js"></script>
</body>
</html>
