<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System - Add Employee</title>
    <link rel="stylesheet" href="../../static/css/application/application_info.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="background"></div>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="top-section">
                <div class="logo-wrapper" id="logoToggle">
                    <img src="../../static/img/general/uph.png" class="logo">
                    <div class="open-icon">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
                <button class="close-btn" id="closeBtn">
                    <i class="fas fa-chevron-left"></i>
                </button>
            </div>

            <ul class="menu">
                <li class="menu-item active">
                    <div class="icon-box"><i class="fas fa-border-all"></i></div>
                    <span>Dashboard</span>
                </li>
                <li class="menu-item">
                    <div class="icon-box"><i class="fas fa-user"></i></div>
                    <span>Profile</span>
                </li>
                <hr>
                <li class="menu-item">
                    <div class="icon-box"><i class="fas fa-user-edit"></i></div>
                    <span>Position Change Request</span>
                </li>
                <li class="menu-item">
                    <div class="icon-box"><i class="fas fa-calendar-check"></i></div>
                    <span>Attendance</span>
                </li>
                <li class="menu-item">
                    <div class="icon-box"><i class="fas fa-plane-departure"></i></div>
                    <span>Leave Request</span>
                </li>
                <li class="menu-item">
                    <div class="icon-box"><i class="fas fa-star"></i></div>
                    <span>Performance Evaluation</span>
                </li>
                <li class="menu-item">
                    <div class="icon-box"><i class="fas fa-folder-open"></i></div>
                    <span>Documents</span>
                </li>
                <li class="menu-item">
                    <div class="icon-box"><i class="fas fa-chalkboard-teacher"></i></div>
                    <span>Trainings</span>
                </li>
            </ul>

            <div class="bottom-section">
                <li class="menu-item">
                    <div class="icon-box"><i class="fas fa-sign-out-alt"></i></div>
                    <span>Log Out</span>
                </li>
            </div>
        </aside>

        <main class="main-content">
            <div class="form-wrapper">
                <form id="employeeForm">
                    <section class="form-card">
                        <div class="card-header">Applicant Information</div>
                        <div class="card-body">
                            <div class="grid-2-col">
                                <div class="form-group">
                                    <label for="firstName">First Name</label>
                                    <input type="text" id="firstName" placeholder="Enter first name" required>
                                </div>
                                <div class="form-group">
                                    <label for="lastName">Last Name</label>
                                    <input type="text" id="lastName" placeholder="Enter last name" required>
                                </div>
                            </div>
                            <div class="grid-2-col">
                                <div class="form-group">
                                    <label for="email">Email</label>
                                    <input type="email" id="email" placeholder="Enter a valid email address" required>
                                </div>
                                <div class="form-group">
                                    <label for="phone">Phone Number</label>
                                    <input type="tel" id="phone" placeholder="Enter phone number">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="dept">Department Applying To</label>
                                <select id="dept" required>
                                    <option value="" disabled selected>Select department...</option>
                                    <option value="HR">Human Resources</option>
                                    <option value="IT">Information Technology</option>
                                </select>
                            </div>
                            <div class="cv-section">
                                <label>Tell us about yourself</label>
                                <div class="upload-container">
                                    <button type="button" class="btn-upload" id="uploadBtn">Upload CV</button>
                                    <span id="fileNameDisplay">File_Name.pdf</span>
                                    <input type="file" id="cvInput" hidden>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="button" class="btn btn-cancel" id="btnCancel">Cancel</button>
                                <button type="submit" class="btn btn-save">Save</button>
                            </div>
                        </div>
                    </section>
                </form>
            </div>
        </main>
    </div>

    <script src="../../static/js/application/application_info.js"></script>
</body>
</html>
