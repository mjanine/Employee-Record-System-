<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard | UPHSD</title>
    <link rel="stylesheet" href="../../static/css/new_employee/new_employee.css">
    <link rel="shortcut icon" type="image/png" href="../../static/img/general/uph.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="background"></div>

    <div class="sidebar" id="sidebar">
        <div class="top-section">
            <div class="logo-wrapper" id="logoToggle">
                <img src="../../static/img/general/uph.png" class="logo" alt="UPHSD Logo">
                <div class="open-icon"><i class="fas fa-chevron-right"></i></div>
            </div>
            <button class="close-btn" id="closeBtn"><i class="fas fa-chevron-left"></i></button>
        </div>

        <ul class="menu">
            <li><a href="emp_dash.html" class="menu-item active"><i class="fas fa-border-all"></i><span>Dashboard</span></a></li>
            <li><a href="#" class="menu-item"><i class="fas fa-user"></i><span>Profile</span></a></li>
            <hr>
            <li><a href="#" class="menu-item"><i class="fas fa-user-edit"></i><span>Position Change</span></a></li>
            <li><a href="#" class="menu-item"><i class="fas fa-calendar-check"></i><span>Attendance</span></a></li>
            <li><a href="#" class="menu-item"><i class="fas fa-plane-departure"></i><span>Leave Request</span></a></li>
            <li><a href="#" class="menu-item"><i class="fas fa-star"></i><span>Evaluation</span></a></li>
            <li><a href="#" class="menu-item"><i class="fas fa-folder-open"></i><span>Documents</span></a></li>
        </ul>

        <div class="bottom-section">
            <a href="../login/login.html" class="menu-item logout">
                <i class="fas fa-sign-out-alt"></i><span>Log Out</span>
            </a>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="header-container">
            <h1>Applications Management</h1>
            <div class="tab-buttons">
                <button class="tab-btn active">New Employee Applications</button>
                <button class="tab-btn">Position Change Requests</button>
            </div>
        </div>

        <div class="search-filter-section">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search by Name / ID / Department / Position">
            </div>
            <button class="filter-btn"><i class="fas fa-filter"></i> Filter</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Application ID</th>
                        <th>Full Name</th>
                        <th>Department</th>
                        <th>Position</th>
                        <th>Submitted</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>001</td>
                        <td>Dela Cruz, Juan</td>
                        <td>CCS</td>
                        <td>Instructor</td>
                        <td>03/07/2026</td>
                        <td><span class="status-pill pending">Pending - HR</span></td>
                        <td class="actions">
                            <a href="#" class="view-link">View</a>
                            <button class="update-link">Update <i class="fas fa-caret-down"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../../static/js/new_employee/new_employee.js"></script>
</body>
</html>
