{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/admin/admin.css' %}">
    <style>
        /* This ensures the background is the light grey/white like User Management */
        body {
            background-color: #f4f7fe !important;
            overflow-y: auto !important;
        }
    </style>
{% endblock %}

{% block content %}
<div class="main-wrapper" style="display: flex;">
    
    {% include 'components/sidebar.html' %}

    <main style="flex-grow: 1; margin-left: 280px; padding: 40px; min-height: 100vh;">
        
        <div class="container-fluid" style="display: flex; justify-content: center; align-items: flex-start; padding-top: 50px;">
            
            <div style="background: white; width: 100%; max-width: 600px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee;">
                
                <div style="display: flex; align-items: center; margin-bottom: 25px;">
                    <div style="background: #800000; color: white; padding: 12px; border-radius: 12px; margin-right: 15px;">
                        <i class="fas fa-shield-alt fa-lg"></i>
                    </div>
                    <div>
                        <h2 style="margin: 0; color: #1e293b; font-weight: 700; font-size: 24px;">Security Settings</h2>
                        <p style="margin: 0; color: #64748b; font-size: 14px;">Manage session and authentication protocols</p>
                    </div>
                </div>

                <hr style="border: 0; border-top: 1px solid #f1f5f9; margin-bottom: 30px;">

                <form method="post">
                    {% csrf_token %}
                    
                    <div style="margin-bottom: 25px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #334155;">
                            Session Timeout Duration (Minutes)
                        </label>
                        <input type="number" name="session_timeout" value="{{ config.session_timeout }}" 
                               style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px;">
                        <p style="margin-top: 8px; font-size: 12px; color: #94a3b8;">
                            Recommended: 30-60 minutes for production.
                        </p>
                    </div>

                    <button type="submit" style="width: 100%; background: linear-gradient(135deg, #ff5722 0%, #800000 100%); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: transform 0.2s;">
                        Update Security Policies
                    </button>
                </form>
            </div>

        </div>
    </main>
</div>
{% endblock %}
