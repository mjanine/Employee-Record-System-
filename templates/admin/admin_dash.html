{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>    
    <link rel="shortcut icon" type="image/png" href="{% static 'img/general/uph.png' %}">
    <link rel="stylesheet" href="{% static 'css/admin/admin.css' %}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Emergency visibility check */
        .debug-banner {
            background: red;
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="debug-banner">SIDEBAR FILE ACTIVE: admin/admin_dash.html</div>

    <div class="background"></div>

    <div class="sidebar" id="sidebar">
        <div class="top-section">
            <div class="logo-wrapper" id="logoToggle">
                <img src="{% static 'img/general/uph.png' %}" class="logo">
                <div class="open-icon">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>

            <button class="close-btn" id="closeBtn">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>

        <ul class="menu">
            <li>
                <a href="{% url 'admin_dashboard' %}" class="menu-item {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
                    <i class="fas fa-border-all"></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <hr>

            <li>
                <a href="{% url 'employee_list' %}" class="menu-item {% if request.resolver_match.url_name == 'employee_list' %}active{% endif %}">
                    <i class="fas fa-users-viewfinder"></i>
                    <span>Employee Records</span>
                </a>
            </li>

            <li>
                <a href="{% url 'department_management' %}" class="menu-item {% if request.resolver_match.url_name == 'department_management' %}active{% endif %}">
                    <i class="fas fa-building"></i>
                    <span>Departments</span>
                </a>
            </li>

            <hr>

            <li>
                <a href="{% url 'audit_trails' %}" class="menu-item {% if request.resolver_match.url_name == 'audit_trails' %}active{% endif %}">
                    <i class="fas fa-history"></i>
                    <span>Audit Trails</span>
                </a>
            </li>

            <li>
                <a href="#" class="menu-item">
                    <i class="fas fa-users-cog"></i>
                    <span>User & Roles</span>
                </a>
            </li>

            <li>
                <a href="#" class="menu-item">
                    <i class="fas fa-shield-alt"></i>
                    <span>Security & Privacy</span>
                </a>
            </li>
        </ul>

        <div class="bottom-section">
            <a href="{% url 'logout' %}" class="menu-item logout">
                <i class="fas fa-sign-out-alt"></i>
                <span>Log Out</span>
            </a>
        </div>
    </div>
        <div id="userModal" class="modal-overlay" 
         style="display: none; position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.75); z-index: 999999 !important; align-items: center; justify-content: center; backdrop-filter: blur(8px);">

        <div class="modal-content" 
             style="background: #ffffff !important; width: 480px !important; padding: 40px !important; border-radius: 35px !important; position: relative !important; box-shadow: 0 25px 60px rgba(0,0,0,0.6) !important; display: block !important;">

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2 style="color: #800000; margin: 0; font-family: sans-serif; font-size: 1.5rem;">Create New User</h2>
                <button type="button" onclick="closeUserModal()" style="background: none; border: none; font-size: 32px; cursor: pointer; color: #666; line-height: 1;">&times;</button>
            </div>

            <form id="userForm" method="POST" action="{% url 'create_user' %}">
                {% csrf_token %}
                <div style="margin-bottom: 18px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">Username</label>
                    <input type="text" name="username" required style="width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 15px; box-sizing: border-box; font-size: 1rem;">
                </div>
                
                <div style="margin-bottom: 18px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">Email Address</label>
                    <input type="email" name="email" required style="width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 15px; box-sizing: border-box; font-size: 1rem;">
                </div>

                <div style="margin-bottom: 25px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #333;">System Role</label>
                    <select name="role" required style="width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 15px; background: white; font-size: 1rem;">
                        <option value="admin">Admin</option>
                        <option value="hr">HR</option>
                        <option value="employee">Employee</option>
                    </select>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 12px;">
                    <button type="button" onclick="closeUserModal()" style="padding: 12px 25px; border-radius: 15px; border: 1px solid #ccc; background: #f8f8f8; cursor: pointer; font-weight: 500;">Cancel</button>
                    <button type="submit" style="padding: 12px 25px; border-radius: 15px; border: none; background: #800000; color: white; font-weight: bold; cursor: pointer; transition: 0.3s;">Save User</button>
                </div>
            </form>
        </div>
    </div>
    <script src="{% static 'js/dashboard/admin_dash.js' %}"></script>
</body>
</html>
