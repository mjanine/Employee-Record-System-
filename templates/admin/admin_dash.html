{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>    
    <link rel="shortcut icon" type="image/png" href="{% static 'img/general/uph.png' %}">
    <link rel="stylesheet" href="{% static 'css/admin/admin_dash.css' %}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Emergency visibility check */
        .debug-banner {
            background: red;
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="debug-banner">SIDEBAR FILE ACTIVE: admin/admin_dash.html</div>

    <div class="background"></div>

    <div class="sidebar" id="sidebar">
        <div class="top-section">
            <div class="logo-wrapper" id="logoToggle">
                <img src="{% static 'img/general/uph.png' %}" class="logo">
                <div class="open-icon">
                    <i class="fas fa-chevron-right"></i>
                </div>
            </div>

            <button class="close-btn" id="closeBtn">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>

        <ul class="menu">
            <li>
                <a href="{% url 'admin_dashboard' %}" class="menu-item {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
                    <i class="fas fa-border-all"></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <hr>

            <li>
                <a href="{% url 'employee_list' %}" class="menu-item {% if request.resolver_match.url_name == 'employee_list' %}active{% endif %}">
                    <i class="fas fa-users-viewfinder"></i>
                    <span>Employee Records</span>
                </a>
            </li>

            <li>
                <a href="{% url 'department_management' %}" class="menu-item {% if request.resolver_match.url_name == 'department_management' %}active{% endif %}">
                    <i class="fas fa-building"></i>
                    <span>Departments</span>
                </a>
            </li>

            <hr>

            <li>
                <a href="{% url 'audit_trails' %}" class="menu-item {% if request.resolver_match.url_name == 'audit_trails' %}active{% endif %}">
                    <i class="fas fa-history"></i>
                    <span>Audit Trails</span>
                </a>
            </li>

            <li>
                <a href="#" class="menu-item">
                    <i class="fas fa-users-cog"></i>
                    <span>User & Roles</span>
                </a>
            </li>

            <li>
                <a href="#" class="menu-item">
                    <i class="fas fa-shield-alt"></i>
                    <span>Security & Privacy</span>
                </a>
            </li>
        </ul>

        <div class="bottom-section">
            <a href="{% url 'logout' %}" class="menu-item logout">
                <i class="fas fa-sign-out-alt"></i>
                <span>Log Out</span>
            </a>
        </div>
    </div>

    <script src="{% static 'js/dashboard/admin_dash.js' %}"></script>
</body>
</html>
